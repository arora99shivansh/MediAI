name: Azure Deploy

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.AZURE_DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and push backend
        run: |
          docker build -f backend/Dockerfile -t ${{ secrets.ACR_LOGIN_SERVER }}/mediai-backend:${{ github.sha }} .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/mediai-backend:${{ github.sha }}
      - name: Build and push frontend
        run: |
          docker build -f frontend/Dockerfile -t ${{ secrets.ACR_LOGIN_SERVER }}/mediai-frontend:${{ github.sha }} .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/mediai-frontend:${{ github.sha }}
      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/mediai-backend:${{ github.sha }}
      - name: Deploy frontend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_FRONTEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/mediai-frontend:${{ github.sha }}
