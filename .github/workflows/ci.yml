name: MediAI CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install backend dependencies
        run: pip install -r requirements.txt
      - name: Run tests with coverage
        env:
          SECRET_KEY: ci-secret-key-with-more-than-32-characters
        run: coverage run -m pytest backend/tests && coverage report --fail-under=70
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t mediai-backend .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t mediai-frontend .
